<!doctype html><html lang='es'><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Reset BabyFood</title><body style='font-family:system-ui;padding:24px;background:#FFFBF5;color:#2C1A0E'><h1>Limpiando BabyFood…</h1><p id='status'>Eliminando service workers y cachés antiguas.</p><button onclick='location.href="./index.html?clean="+Date.now()'>Abrir BabyFood</button><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister()));} if('caches'in window){const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k)));} document.getElementById('status').textContent='Limpieza completada. Redirigiendo…'; setTimeout(()=>location.href='./index.html?clean='+Date.now(),800);}catch(e){document.getElementById('status').textContent='Error: '+e.message;}})();</script></body></html>
