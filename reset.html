<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Reset BabyFood</title><style>body{font-family:system-ui;padding:24px;background:#FFFBF5;color:#2C1A0E;max-width:600px;margin:auto}button,a{display:inline-block;margin-top:12px;padding:12px 16px;border-radius:12px;background:#E8722A;color:white;text-decoration:none;border:0;font-weight:800}</style></head><body><h1>BabyFood reset</h1><p id='msg'>Limpiando service workers y cachés antiguas...</p><a href='./index.html?clean=9'>Abrir BabyFood limpio</a><script>(async()=>{try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister()));} if(window.caches){const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k)));} document.getElementById('msg').textContent='Limpieza completada. Abre BabyFood limpio.';}catch(e){document.getElementById('msg').textContent='Limpieza parcial: '+e.message;}})();</script></body></html>
